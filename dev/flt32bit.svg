<svg width="500" height="150" xmlns="http://www.w3.org/2000/svg">
  <!-- Bit labels -->
  <text x="10" y="20" font-family="Arial" font-size="14" fill="black">Sign (1 bit)</text>
  <text x="90" y="20" font-family="Arial" font-size="14" fill="black">Exponent (8 bits)</text>
  <text x="210" y="20" font-family="Arial" font-size="14" fill="black">Mantissa (23 bits)</text>
  
  <!-- Boxes for the bits -->
  <rect x="10" y="30" width="40" height="40" fill="#cce5ff" stroke="black"/>
  <rect x="60" y="30" width="120" height="40" fill="#c1f0c1" stroke="black"/>
  <rect x="190" y="30" width="300" height="40" fill="#ffcccc" stroke="black"/>
  
  <!-- Bit number labels -->
  <text x="10" y="85" font-family="Arial" font-size="12" fill="black">31</text>
  <text x="60" y="85" font-family="Arial" font-size="12" fill="black">30</text>
  <text x="75" y="85" font-family="Arial" font-size="12" fill="black">29</text>
  <text x="90" y="85" font-family="Arial" font-size="12" fill="black">28</text>
  <text x="105" y="85" font-family="Arial" font-size="12" fill="black">...</text>
  <text x="160" y="85" font-family="Arial" font-size="12" fill="black">23</text>
  <text x="190" y="85" font-family="Arial" font-size="12" fill="black">22</text>
  <text x="205" y="85" font-family="Arial" font-size="12" fill="black">21</text>
  <text x="220" y="85" font-family="Arial" font-size="12" fill="black">...</text>
  <text x="470" y="85" font-family="Arial" font-size="12" fill="black">0</text>
  
  <!-- Sections labels -->
  <text x="20" y="120" font-family="Arial" font-size="12" fill="black">Sign</text>
  <text x="110" y="120" font-family="Arial" font-size="12" fill="black">Exponent</text>
  <text x="330" y="120" font-family="Arial" font-size="12" fill="black">Mantissa</text>
</svg>
