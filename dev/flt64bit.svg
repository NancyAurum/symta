<svg width="600" height="150" xmlns="http://www.w3.org/2000/svg">
  <!-- Bit labels -->
  <text x="10" y="20" font-family="Arial" font-size="14" fill="black">Sign (1 bit)</text>
  <text x="90" y="20" font-family="Arial" font-size="14" fill="black">Exponent (11 bits)</text>
  <text x="260" y="20" font-family="Arial" font-size="14" fill="black">Mantissa (52 bits)</text>
  
  <!-- Boxes for the bits -->
  <rect x="10" y="30" width="60" height="40" fill="#cce5ff" stroke="black"/>
  <rect x="80" y="30" width="160" height="40" fill="#c1f0c1" stroke="black"/>
  <rect x="250" y="30" width="330" height="40" fill="#ffcccc" stroke="black"/>
  
  <!-- Bit number labels -->
  <text x="10" y="85" font-family="Arial" font-size="12" fill="black">63</text>
  <text x="80" y="85" font-family="Arial" font-size="12" fill="black">62</text>
  <text x="95" y="85" font-family="Arial" font-size="12" fill="black">61</text>
  <text x="110" y="85" font-family="Arial" font-size="12" fill="black">60</text>
  <text x="125" y="85" font-family="Arial" font-size="12" fill="black">...</text>
  <text x="220" y="85" font-family="Arial" font-size="12" fill="black">52</text>
  <text x="250" y="85" font-family="Arial" font-size="12" fill="black">51</text>
  <text x="265" y="85" font-family="Arial" font-size="12" fill="black">50</text>
  <text x="280" y="85" font-family="Arial" font-size="12" fill="black">...</text>
  <text x="560" y="85" font-family="Arial" font-size="12" fill="black">0</text>
  
  <!-- Sections labels -->
  <text x="30" y="120" font-family="Arial" font-size="12" fill="black">Sign</text>
  <text x="150" y="120" font-family="Arial" font-size="12" fill="black">Exponent</text>
  <text x="400" y="120" font-family="Arial" font-size="12" fill="black">Mantissa</text>
</svg>
